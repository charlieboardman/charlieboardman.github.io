<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#18392b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Budget">
  <title>Rolling Budget</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="entry">
<main class="shell">
  <header class="topbar">
    <div>
      <span class="eyebrow">Available now</span>
      <h1 class="balance" id="balance">$0.00</h1>
      <span class="daily-rate" id="daily-rate">$0.00 added each day</span>
    </div>
    <a class="icon-button" href="settings.html" aria-label="Settings">⚙</a>
  </header>

  <div id="notice" aria-live="polite"></div>

  <section class="card spend-card">
    <h2>Add transaction</h2>
    <p class="help">Use a positive amount for spending or a negative amount for a refund.</p>
    <form id="expense-form">
      <label>Amount<div class="money-input"><span>$</span><input name="amount" type="number" inputmode="decimal" step="0.01" placeholder="0.00 or −10.00" required autofocus></div></label>
      <label>Vendor<input name="vendor" maxlength="100" autocomplete="organization" placeholder="Coffee shop" required></label>
      <label>Description <small>Optional</small><input name="description" maxlength="240" placeholder="Breakfast"></label>
      <button type="submit">Add transaction</button>
    </form>
  </section>

  <section class="activity">
    <div class="section-title"><h2>Recent activity</h2><button class="activity-toggle" id="activity-toggle" type="button" hidden>Show all</button></div>
    <div id="recent"><div class="empty">Loading your budget…</div></div>
  </section>
</main>
<noscript><p class="noscript">Rolling Budget needs JavaScript to store your budget on this device.</p></noscript>
<script type="module" src="app.js"></script>
</body>
</html>
